name: Build Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Java Environment (JDK 17)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle Build wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Compile and Build Debug APK
      run: ./gradlew assembleDebug

    - name: Generate Direct Download Link
      uses: actions/upload-artifact@v4
      with:
        name: Cricket-Boundary-App
        path: app/build/outputs/apk/debug/app-debug.apk
